<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <meta name= "author" content= "Adam Claycamp">
    <link rel= "stylesheet" href= "styles/quiz.css">
    <meta name= "description" content= "HTMl and CSS quiz">
</head>
<body>

    <header>
        <p><h1>Basic HTML and CSS Quiz</h1></p>
    </header>
    <main>
        <form>
            <div class="form-item row1">
                <label for="cssquestion">1. What does the acronym CSS stand for?</label>
                <input type="text" id="q1" name="q1">
            </div>
            <div class="form-item row2">
                <label for="fullname">2. How are id and class attributes selected in CSS?</label>
                <textarea name="q2" id="q2" rows="4"></textarea>
            </div>
            <div class="form-item row3">
                <label for="fullname">3. Which of the following is a Valid CSS comment?</label>
                <select id="q3" name="q3">
                    <option value="choose">Choose One ...</option>
                    <option value="/#">/#</option>
                    <option value="/\">/\</option>
                    <option value="/*">/*</option>
                </select>
            </div>
            <div class="form-item row4">
                <label for="fullname">4. What is the bottom margin given this declaration</label>
                <input type="number" id="q4" name="q4">
            </div>
            <button type="submit">Submit Quiz</button>
        </form>    
        
    </main>
    <footer>

    </footer>

</body>
</html>
