<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us Whitewater Adventures</title>
    <link rel= "stylesheet" href= "styles/rafting.css">
    <meta name="author" content="Adam Claycamp">
    <meta name= "description" content= "This page helps provide a customer the ways to get ahold of the business.">

</head>
<body>
    <header>
        <nav>
            <img src="./images/skelletons.jpg" alt="Logo">
            <a href="index.html"><h3>Home</h3></a>
            <a href="About.html"><h3>About Us</h3></a>
            <a href="trips.html"><h3>Trips</h3></a>
            <a href="contact.html"><h3>Contact Us</h3></a>
        </nav>
    </header>
    
    <main>
        <h1 class="mainh1">Contact Us</h1>
        <section class="section1">
            <div class="s1d1">
            <p>Company Address</p>
            <p>Company Email</p>
            <p>Company Phone Number</p>
            </div>

            <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d36984.2131472585!2d-121.52132626398851!3d38.91899252648186!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sus!4v1712727478685!5m2!1sen!2sus" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>

        </section>
        <section class="section2">
            <form>
                <fieldset>
                    <legend><h1>Want to let us know something?</h1></legend>
                    <div class="topfieldset"> 
                        <div class="topleft">
                            <div class="s2d1">
                                <label for="fullname">Full Name:</label>
                                <input type="text" id="fullname" name="fullname">
                            </div>
                            <div class="s2d1">
                                <label for="email">Email:</label>
                                <input type="text" id="email" name="email">
                            </div>
                            <div>
                                <input type="radio" name="GeneralInquiry" id="GeneralInquiry">
                                <label for="GeneralInquiry">General Inquiry</label>
                            </div>
                            <div>
                                <input type="radio" name="ReservationQuestion" id="ReservationQuestion">
                                <label for="ReservationQuestion">Reservation Question</label>
                            </div>
                            <div>
                                <input type="radio" name="WebsiteSuggestion" id="WebsiteSuggestion">
                                <label for="WebsiteSuggestion">Website Suggestion</label>
                            </div>
                        </div>
                        <div class="topright">
                            <label for="feedback">Drop us a line below</label>
                            <textarea name="feedback" id="feedback" rows="6" placeholder="example...We had such a great time!"></textarea>
                        </div>
                    </div>
                    <div class="bottomfieldset">
                        <div class="check">
                            <label for="newsletter">Please subscribe me to the monthly news letter</label>
                            <input type="checkbox" id="newsletter" name="newsletter">
                        </div>
                        <button type="submit">Submit</button>
                       
                    </div>
                </fieldset>
               
            </form>
        </section>
        <section class="section3">
            <figure>
                <img src="/wwr/images/happygirl.jpeg" alt="Happy Girl">
                <figcaption>Granola</figcaption>   
            </figure>
            <figure>
                <img src="/wwr/images/happyemployee.jpeg" alt="Happy Rafter"> 
                <figcaption>Sam</figcaption>
            </figure>
            <figure>
                <img src="/wwr/images/raftingguy.jpeg" alt="Happy Dude"> 
                <figcaption>Scott</figcaption>
            </figure>

        </section>
    </main>
        <footer>
            <p> ©2024 - White Water Adventures | Adam Claycamp</p>
            
            <div>
                <a href="https://app.moqups.com/5IaKRlWrstfeZcdD0qPmcUNqXBJZRX6r/view/page/ad64222d5"><img src="images/moqups.png" alt="wireframe mockup"></a>
                <a href="https://facebook.com"><img src="images/facebook.png" alt="Facebook"></a>
                <a href="https://X.com"><img src="images/x.png" alt="X"></a>
                <a href="https://instagram.com"><img src="images/insta.png" alt="Instagram"></a>
            </div>
        </footer>

</body>
</html>
